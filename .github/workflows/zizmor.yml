name: Workflow security lint

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
      security-events: write
    uses: uw-ssec/.github/.github/workflows/zizmor-lint.yml@main # zizmor: ignore[unpinned-uses] centrally managed org workflow
    with:
      enforce: false
