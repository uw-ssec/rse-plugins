# ==============================================================================
# GitHub Actions Workflow: Publish to Docker Hub
#
# Triggers on version tag push (v*). Builds a multi-architecture image
# (amd64 + arm64) and pushes to Docker Hub.
#
# Prerequisites:
#   - Create a Docker Hub access token at https://hub.docker.com/settings/security
#   - Add repository secrets:
#     - DOCKERHUB_USERNAME: your Docker Hub username
#     - DOCKERHUB_TOKEN: your Docker Hub access token (not password)
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
# ==============================================================================

name: Publish to Docker Hub

on:
  push:
    tags:
      - 'v*'

env:
  # Set to your Docker Hub username/org and image name
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------------------
      # 1. Checkout source code
      # --------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------------------
      # 2. Set up QEMU for multi-architecture builds
      # --------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # --------------------------------------------------------------------
      # 3. Set up Docker Buildx
      # --------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------------------------------
      # 4. Authenticate with Docker Hub
      #    Uses an access token (not password) for security.
      #    Create tokens at: https://hub.docker.com/settings/security
      # --------------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --------------------------------------------------------------------
      # 5. Extract metadata (tags and labels)
      #    Generates semver tags, SHA tag, and OCI labels.
      # --------------------------------------------------------------------
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Semantic version tags from git tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Git short SHA for traceability
            type=sha
            # Latest tag on default branch
            type=raw,value=latest,enable={{is_default_branch}}

      # --------------------------------------------------------------------
      # 6. Build and push multi-architecture image
      #    Builds for amd64 and arm64. Uses GitHub Actions cache.
      # --------------------------------------------------------------------
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --------------------------------------------------------------------
      # 7. Update Docker Hub description (optional)
      #    Syncs the repository README to Docker Hub's description.
      #    Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets.
      # --------------------------------------------------------------------
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: ${{ github.event.repository.description }}

      # --------------------------------------------------------------------
      # 8. Output image details
      # --------------------------------------------------------------------
      - name: Image digest
        run: echo "Published ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
