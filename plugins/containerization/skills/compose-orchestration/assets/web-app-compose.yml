# =============================================================================
# Web Application Stack — FastAPI/Flask + PostgreSQL + Redis
# =============================================================================
# Usage:
#   1. Copy this file to your project as compose.yml
#   2. Create a .env file with the variables below (or rename .env.example)
#   3. Run: docker compose up -d
#
# Required .env variables:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB,
#   API_PORT (default: 8000), REDIS_PORT (default: 6379)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API — Python web application (FastAPI or Flask)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production              # Multi-stage build target
    container_name: app-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379/0"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    # Run as non-root user (must be created in the Dockerfile)
    # user: "1000:1000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PostgreSQL — relational database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: app-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — in-memory cache / message broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: app-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

# =============================================================================
# Networks
# =============================================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# =============================================================================
# Volumes — Docker-managed persistent storage
# =============================================================================
volumes:
  pg-data:
    driver: local
  redis-data:
    driver: local
